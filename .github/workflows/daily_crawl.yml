name: Daily News Crawler

on:
  schedule:
    # 這行代表每天 UTC 時間 00:00 執行 (台灣時間早上 8 點)
    - cron: '0 0 * * *'
  workflow_dispatch: # 這讓你可以在網頁上「手動」點擊按鈕立即執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install PyGithub requests beautifulsoup4

      - name: 執行爬蟲腳本
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python test_github.py
